plugins {
    id 'java'
}

group = 'kr.co.javaex'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation platform('com.fasterxml.jackson:jackson-bom:2.17.0')
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    // 오라클 DB 접속 및 전자지갑 보안 라이브러리!! -> 이거 중요쓰
    implementation "com.oracle.database.jdbc:ojdbc11:23.4.0.24.05"
    implementation "com.oracle.database.security:oraclepki:23.4.0.24.05" // 필수!
    implementation "com.oracle.database.security:osdt_core:21.9.0.0" // 필수!
    implementation "com.oracle.database.security:osdt_cert:21.9.0.0" // 필수!
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaExec) {
    systemProperty 'file.encoding', 'UTF-8'
    systemProperty 'stdout.encoding', 'UTF-8'
    jvmArgs '-Dfile.encoding=UTF-8'
    jvmArgs '-Dconsole.encoding=UTF-8'
}

